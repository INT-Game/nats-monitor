<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>登录 - NATS Monitor</title>
  <link rel="icon" href="/assets/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="loginTitle">
      <div class="login-brand">
        <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
        <span>NATS Monitor</span>
      </div>
      <div class="login-heading">
        <p class="eyebrow">Protected access</p>
        <h1 id="loginTitle">登录监控控制台</h1>
      </div>
      <div id="loginError" class="login-error" role="alert" hidden></div>
      <form class="login-form" action="/login" method="post">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" autocomplete="username" maxlength="128" required autofocus>
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" maxlength="256" required>
        <button class="button login-button" type="submit">登录</button>
      </form>
    </section>
  </main>
  <script src="/assets/login.js" defer></script>
</body>
</html>
